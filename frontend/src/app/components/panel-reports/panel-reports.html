<div class="space-y-6 text-white">

  <!-- HEADER -->
  <div class="flex justify-between items-center">
    <h2 class="text-3xl font-bold">Reports & Analytics</h2>

    <button (click)="exportExcel()"
      class="bg-purple-600/30 border border-purple-500/50 px-4 py-2 rounded-xl text-sm hover:bg-purple-600/40 transition">
      📥 Export Excel
    </button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">

    <div class="p-4 rounded-xl bg-blue-600/20 border border-blue-500/30">
      <p class="text-sm opacity-70">Total Leaves</p>
      <h2 class="text-2xl font-bold">{{ reportData?.totalLeaves }}</h2>
    </div>

    <div class="p-4 rounded-xl bg-green-600/20 border border-green-500/30">
      <p class="text-sm opacity-70">Approved Leaves</p>
      <h2 class="text-2xl font-bold">{{ reportData?.approvedLeaves }}</h2>
    </div>

    <div class="p-4 rounded-xl bg-yellow-600/20 border border-yellow-500/30">
      <p class="text-sm opacity-70">Avg Duration</p>
      <h2 class="text-2xl font-bold">{{ reportData?.avgDuration }}</h2>
    </div>

    <div class="p-4 rounded-xl bg-purple-600/20 border border-purple-500/30">
      <p class="text-sm opacity-70">Active Staff</p>
      <h2 class="text-2xl font-bold">{{ reportData?.activeStaff }}</h2>
    </div>

  </div>

  <!-- CHART SECTION -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- BAR CHART -->
    <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-md">
      <h3 class="text-lg font-bold mb-4">Monthly Leave Trends</h3>
      <canvas #barChart></canvas>
    </div>

    <!-- DOUGHNUT CHART -->
    <div class="bg-white/5 border border-white/10 rounded-3xl p-6 backdrop-blur-md">
      <h3 class="text-lg font-bold mb-4">Leave Type Distribution</h3>
      <canvas #doughnutChart></canvas>
    </div>

  </div>

</div>
