<div class="min-h-screen bg-[#0f071a] flex items-center justify-center p-6 text-white">

  <div class="w-full max-w-2xl bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-md">

    <h2 class="text-2xl font-bold mb-6 text-center">Add Employee</h2>

    <!-- Loader -->
    <div *ngIf="isLoading" class="text-center py-10 text-gray-400">
      Saving employee...
    </div>

    <!-- Form -->
    <form *ngIf="!isLoading" [formGroup]="employeeForm" (ngSubmit)="onSaveEmployee()" class="space-y-4">

      <!-- Name -->
      <div>
        <input formControlName="name" placeholder="Full Name"
          class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
        <p *ngIf="employeeForm.get('name')?.touched && employeeForm.get('name')?.invalid" class="text-red-400 text-sm">
          Minimum 3 characters required
        </p>
      </div>

      <!-- Email -->
      <div>
        <input formControlName="email" placeholder="Email"
          class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
        <p *ngIf="employeeForm.get('email')?.touched && employeeForm.get('email')?.invalid"
          class="text-red-400 text-sm">
          Enter valid email
        </p>
      </div>

      <!-- Department + Position -->
      <div class="grid grid-cols-2 gap-4">

        <div>
          <input formControlName="department" placeholder="Department"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('department')?.touched && employeeForm.get('department')?.invalid"
            class="text-red-400 text-sm">
            Required
          </p>
        </div>

        <div>
          <input formControlName="position" placeholder="Position"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('position')?.touched && employeeForm.get('position')?.invalid"
            class="text-red-400 text-sm">
            Required
          </p>
        </div>

      </div>

      <!-- Phone + Location -->
      <div class="grid grid-cols-2 gap-4">

        <div>
          <input formControlName="phone" placeholder="Phone"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('phone')?.touched && employeeForm.get('phone')?.invalid"
            class="text-red-400 text-sm">
            Enter valid 10-digit number
          </p>
        </div>

        <div>
          <input formControlName="location" placeholder="Location"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('location')?.touched && employeeForm.get('location')?.invalid"
            class="text-red-400 text-sm">
            Required
          </p>
        </div>

      </div>

      <!-- Join Date + Leave Balance -->
      <div class="grid grid-cols-2 gap-4">

        <div>
          <input type="date" formControlName="joinDate"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('joinDate')?.touched && employeeForm.get('joinDate')?.invalid"
            class="text-red-400 text-sm">
            Required
          </p>
        </div>

        <div>
          <input type="number" formControlName="leaveBalance" placeholder="Leave Balance"
            class="w-full p-3 rounded-xl bg-white/10 border border-white/20" />
          <p *ngIf="employeeForm.get('leaveBalance')?.touched && employeeForm.get('leaveBalance')?.invalid"
            class="text-red-400 text-sm">
            Must be 0 or more
          </p>
        </div>

      </div>

      <!-- Buttons -->
      <div class="flex gap-4 pt-4">

        <button type="button" (click)="goBack()" class="flex-1 bg-gray-600 py-3 rounded-xl font-bold">
          Cancel
        </button>

        <button type="submit" [disabled]="isLoading"
          class="flex-1 bg-green-500 hover:bg-green-400 disabled:bg-gray-500 py-3 rounded-xl font-bold">
          {{ isLoading ? 'Saving...' : 'Save Employee' }}
        </button>

      </div>

    </form>

  </div>

</div>
