<div class="p-6 text-white">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">All Employees</h2>

    <input type="text" placeholder="Search..." [(ngModel)]="searchQuery" (input)="triggerSearch()"
      class="px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-sm" />
  </div>

  <div class="mb-6">
    <input type="text" placeholder="Search by name, email, department..." [(ngModel)]="searchQuery"
      (input)="triggerSearch()"
      class="w-full md:w-1/3 px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-sm outline-none focus:ring-2 focus:ring-purple-500" />
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">

    <div *ngFor="let emp of paginatedEmployees"
      class="bg-white/5 border border-white/10 rounded-2xl p-5 hover:bg-white/10 transition">

      <!-- HEADER -->
      <div class="flex items-center justify-between mb-4">

        <div class="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center font-bold">
          {{ emp.name?.charAt(0) }}
        </div>

        <span class="text-xs px-3 py-1 rounded-full bg-green-500/20 text-green-400">
          {{ emp.status }}
        </span>

      </div>

      <!-- INFO -->
      <h3 class="text-lg font-semibold truncate">{{ emp.name }}</h3>
      <p class="text-sm text-gray-400 truncate">{{ emp.email }}</p>
      <p class="text-sm text-gray-400">{{ emp.department }}</p>
      <p class="text-sm text-purple-400 mt-1">{{ emp.position }}</p>

      <!-- ACTIONS -->
      <div class="flex gap-2 mt-4 text-xs">

        <button [routerLink]="['/view-employee', emp.id]" class="px-2 py-1 bg-blue-500 rounded-lg hover:bg-blue-400">
          View
        </button>

        <button [routerLink]="['/edit-employee', emp.id]"
          class="px-2 py-1 bg-purple-600 rounded-lg hover:bg-purple-500">
          Edit
        </button>

        <button (click)="deleteEmployee(emp.id)" class="px-2 py-1 bg-red-500 rounded-lg hover:bg-red-400">
          Delete
        </button>

      </div>

    </div>

  </div>

  <!-- PAGINATION -->
  <div class="flex justify-center mt-8 gap-2">

    <button (click)="prevPage()" class="px-3 py-1 bg-white/10 rounded">Prev</button>

    <span class="px-3 py-1">
      Page {{ currentPage }} / {{ totalPages }}
    </span>

    <button (click)="nextPage()" class="px-3 py-1 bg-white/10 rounded">Next</button>

  </div>

</div>
