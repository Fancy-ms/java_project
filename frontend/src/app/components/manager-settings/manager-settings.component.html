<div class="p-6 text-white">

  <!-- HEADER -->
  <h1 class="text-3xl font-bold mb-6">⚙️ Manager Settings</h1>

  <!-- PROFILE CARD -->
  <div class="bg-[#1D546C] p-6 rounded-2xl shadow-lg space-y-4">

    <div>
      <label class="text-sm text-white/70">Name</label>
      <input type="text" class="w-full p-3 rounded-xl bg-white/10 text-white outline-none" placeholder="Enter name">
    </div>

    <div>
      <label class="text-sm text-white/70">Email</label>
      <input type="email" class="w-full p-3 rounded-xl bg-white/10 text-white outline-none" placeholder="Enter email">
    </div>

    <div>
      <label class="text-sm text-white/70">Password</label>
      <input type="password" class="w-full p-3 rounded-xl bg-white/10 text-white outline-none" placeholder="New password">
    </div>

    <button class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-xl mt-4">
      Save Changes
    </button>

  </div>

</div>
