<aside class="flex h-full w-72 flex-col bg-[#1a0b2e] p-6 text-white shadow-2xl">
  <header class="mb-10 flex items-center gap-4 px-2">
    <div
      class="flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-pink-500 to-blue-400 shadow-lg shadow-pink-500/20">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
      </svg>
    </div>
    <div>
      <h1 class="text-xl font-bold tracking-tight">HR Panel</h1>
      <p class="text-xs font-medium text-slate-400">Admin Dashboard</p>
    </div>
  </header>
  <nav class="flex-1 space-y-2">

    <button routerLink="/admin/dashboard"
      routerLinkActive="bg-gradient-to-r from-purple-500 via-pink-500 to-cyan-500 text-white"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 hover:bg-white/5">
      ⊞ Dashboard
    </button>

    <button routerLink="/admin/leaves"
      routerLinkActive="bg-gradient-to-r from-purple-500 via-pink-500 to-cyan-500 text-white"
      class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 hover:bg-white/5">
      📄 Leave Requests
    </button>

    <button routerLink="/admin/employees"
      routerLinkActive="bg-gradient-to-r from-purple-500 via-pink-500 to-cyan-500 text-white"
      class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 hover:bg-white/5">
      👥 Employees
    </button>

    <button routerLink="/admin/reports"
      class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 hover:bg-white/5">
      📊 Reports
    </button>

    <button routerLink="/admin/calendar"
      class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 hover:bg-white/5">
      📅 Calendar
    </button>

  </nav>

  <footer class="mt-auto space-y-2 pt-10">
    <hr class="mb-6 border-white/5" />

    <button class="flex w-full items-center gap-4 rounded-2xl px-4 py-4 text-slate-300 transition-all hover:bg-white/5">
      <span class="text-xl">⚙️</span>
      <span class="font-semibold">Settings</span>
    </button>

    <button
      class="flex w-full items-center gap-4 rounded-2xl bg-red-900/20 px-4 py-4 font-semibold text-red-400 transition-all hover:bg-red-900/40">
      <span class="text-xl">↳</span>
      <span>Logout</span>
    </button>
  </footer>
</aside>
