<div class="p-6 text-white bg-[#0f071a] min-h-screen">

  <h2 class="text-2xl font-bold mb-6 text-green-400">
    ✔️ Approved Employees
  </h2>

  <div *ngFor="let emp of approvedEmployees"
       class="p-3 mb-2 bg-white/5 rounded-xl border border-green-500">

    <p><b>Email:</b> {{ emp.employee?.email || emp.email || 'N/A' }}</p>

    <p><b>Status:</b>
      <span class="text-green-400 font-bold">{{ emp.status }}</span>
    </p>

  </div>

</div>
